<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>时刻Yi好</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --fg-primary: #b86bff;
      --fg-secondary: #9d5cd0;
      --fg-muted: #7a42b5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Mono', monospace;
      background: #000000;
      color: var(--fg-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: fixed;
      inset: 0;
    }

    /* 彻底关闭多余图层 */
    body::before,
    body::after {
      display: none;
    }

    .clock-container {
      width: 100%;
      text-align: center;
    }

    .time-display {
      font-size: clamp(5rem, 28vh, 35vh);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
      display: inline-flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .time-digit {
      min-width: 1.2em;
      text-align: center;
      /* 弱化切换动画，更像息屏静态刷新 */
      transition: opacity 0.1s ease;
    }

    .time-digit.changing {
      opacity: 0.4;
    }

    .time-separator {
      color: var(--fg-muted);
      margin: 0 0.05em;
      opacity: 0.7;
    }

    .seconds {
      font-size: 0.22em;
      color: var(--fg-secondary);
      margin-left: 0.02em;
    }

    .control-bar {
      display: none;
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 横屏全屏适配 */
    @media (orientation: landscape) {
      .time-display {
        font-size: clamp(6rem, 32vh, 40vh);
      }
    }

    :fullscreen,
    :-webkit-full-screen {
      .time-display {
        font-size: clamp(7rem, 36vh, 45vh);
      }
    }

    @media (max-width: 640px) {
      .time-display {
        font-size: clamp(3.5rem, 22vh, 28vh);
      }
    }

    /* 减少动效适配省电 */
    @media (prefers-reduced-motion: reduce) {
      .fade-in { animation: none; opacity: 1; }
      .time-digit.changing { transition: none; }
    }
  </style>
</head>
<body>
  <div class="clock-container">
    <div class="time-display fade-in" id="timeDisplay">
      <span class="time-segment" id="hours">
        <span class="time-digit">0</span>
        <span class="time-digit">0</span>
      </span>
      <span class="time-separator">:</span>
      <span class="time-segment" id="minutes">
        <span class="time-digit">0</span>
        <span class="time-digit">0</span>
      </span>
      <span class="seconds" id="seconds">00</span>
    </div>
  </div>

  <div class="control-bar" id="controlBar"></div>

  <script>
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    let lastSeconds = -1;
    let lastMinutes = -1;
    let lastHours = -1;
    let wakeLock = null;

    function updateTimeDigits(element, value, lastValue) {
      const digits = element.querySelectorAll('.time-digit');
      const str = value.toString().padStart(2, '0');
      const lastStr = lastValue.toString().padStart(2, '0');
      
      digits.forEach((digit, i) => {
        if (str[i] !== lastStr[i]) {
          digit.classList.add('changing');
          setTimeout(() => {
            digit.textContent = str[i];
            digit.classList.remove('changing');
          }, 50);
        }
      });
    }

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      if (hours !== lastHours) {
        updateTimeDigits(hoursEl, hours, lastHours >= 0 ? lastHours : hours);
        lastHours = hours;
      }
      if (minutes !== lastMinutes) {
        updateTimeDigits(minutesEl, minutes, lastMinutes >= 0 ? lastMinutes : minutes);
        lastMinutes = minutes;
      }
      
      secondsEl.textContent = seconds.toString().padStart(2, '0');
    }

    // 全屏
    function toggleFullscreen() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      }
    }

    // 屏幕常亮，模拟息屏不熄灭
    async function enableWakeLock() {
      if ('wakeLock' in navigator && !wakeLock) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => wakeLock = null);
        } catch (err) {
          console.log('常亮锁定失败：', err.message);
        }
      }
    }

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && !wakeLock) {
        await enableWakeLock();
      }
    });

    function init() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');

      hoursEl.querySelectorAll('.time-digit').forEach((d, i) => d.textContent = hours[i]);
      minutesEl.querySelectorAll('.time-digit').forEach((d, i) => d.textContent = minutes[i]);

      updateClock();
      setInterval(updateClock, 1000);

      // 打开3秒后自动全屏+常亮，变身息屏时钟
      setTimeout(() => {
        toggleFullscreen();
        enableWakeLock();
      }, 3000);
    }

    init();
  </script>
</body>
</html>
